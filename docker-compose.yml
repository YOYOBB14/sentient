services:
  postgres:
    image: postgres:16-alpine
    container_name: colony-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: colony
      POSTGRES_PASSWORD: colony123
      POSTGRES_DB: colony
    ports:
      - "5432:5432"
    volumes:
      - colony_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony -d colony"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: colony-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - colony_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  colony_pgdata:
  colony_redis:
